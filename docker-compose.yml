version: "3.9"

services:

  backend:
    image: python:3.11
    ports:
      - "8000:8000"
    command: python -m http.server 8000

  frontend:
    image: node:18
    ports:
      - "3000:3000"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stocks
    ports:
      - "5432:5432"